<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    //parseFloat()
    let a = parseInt(prompt("Enter a:"))
    let b = parseInt(prompt("Enter b:"))
    //let c=a+(b)
    document.write('<br> Addition is ' + (a + b))
    document.write('<br> subtraction is ' + (a - b))
    document.write('<br> Remainder is ' + (a % b))
    c = a ** 3
    document.write('<br> C is ' + c)
   d=12
   document.write('<br> D is ' + d)
   e=a++ // postfix +1
   document.write('<br> E is ' + e)
   f=++a // Prefix +1
   document.write('<br> F is ' + f)

</script>
</body>
</html>
