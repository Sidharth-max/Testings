<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>class Animal {
  speak() {
    console.log("Some generic sound");
  }
}

class Dog extends Animal {
  speak() {
    console.log("Woof!");
  }
}

class Cat extends Animal {
  speak() {
    console.log("Meow!");
  }
}

// Polymorphism in action:
const animals = [new Dog(), new Cat(), new Animal()];

animals.forEach(animal => {
  animal.speak(); // The same method call produces different behaviors
});
</script>
</body>
</html>
