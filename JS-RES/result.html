<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let m1 = 75
    let m2 = 35
    let m3 = 79
    let total = m1 + m2 + m3;
    let per = total/3
    document.write('<br>Total is ' + total)
    document.write('<br>Total per: ' + per)
    if (per >= 80){
        document.write('<br> Grade is A+')
    }
    else if (per >= 70){
        document.write('<br> Grade is A')
    }
    else if (per >= 60){
        document.write('<br> Grade is B')
    }
    else if (per >= 50){
        document.write('<br> Grade is C')
    }
    else if (per >= 40){
        document.write('<br> Grade is D')
    }
    else {
        document.write('<br> Grade is F')
    }


</script>
</body>
</html>
