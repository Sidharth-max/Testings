<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    //<,>,<=,>=,==,!=,===,!==
    let a = 85
    let b = 68
    document.write('<br> a > b is '+(a>b))
    document.write('<br> a < b is '+(a<b))
    document.write('<br> a >= b is '+(a>=b))
    // logical OP = &&,||,|
    let c = 55
    document.write('<br> a > b && a > c  is '+(c>b && a>c))


</script>
</body>
</html>
