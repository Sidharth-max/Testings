<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>



<h1>Bank Application</h1>
<p>Please check the prompts to interact with the bank menu.</p>

<script>
    let balance = 0;
    let isRunning = true;

    while (isRunning) {
        // Prompt the user for their choice
        let choice = prompt(
            "--- Bank Menu ---\n" +
            "1. Deposit\n" +
            "2. Withdraw\n" +
            "3. Check Balance\n" +
            "4. Exit\n\n" +
            "Please enter your choice (1-4):"
        );

        // Use a switch statement to handle the choice
        switch (choice) {
            case '1':
                let depositInput = prompt("Enter amount to deposit:");
                let depositAmount = parseFloat(depositInput);

                if (!isNaN(depositAmount) && depositAmount > 0) {
                    balance += depositAmount;
                    alert("Successfully deposited $" + depositAmount + ".\nCurrent balance: $" + balance);
                } else {
                    alert("Invalid amount entered. Please enter a valid number.");
                }
                break;

            case '2':
                let withdrawInput = prompt("Enter amount to withdraw:");
                let withdrawAmount = parseFloat(withdrawInput);

                if (!isNaN(withdrawAmount) && withdrawAmount > 0) {
                    if (withdrawAmount <= balance) {
                        balance -= withdrawAmount;
                        alert("Successfully withdrew $" + withdrawAmount + ".\nCurrent balance: $" + balance);
                    } else {
                        alert("Insufficient funds. Your current balance is $" + balance);
                    }
                } else {
                    alert("Invalid amount entered. Please enter a valid number.");
                }
                break;

            case '3':
                alert("Your current balance is: $" + balance);
                break;

            case '4':
                alert("Exiting... Thank you for using our bank!");
                isRunning = false; // Stop the loop
                break;

            case null: // Handles if the user clicks "Cancel" on the prompt
                alert("Exiting... Thank you for using our bank!");
                isRunning = false;
                break;

            default:
                alert("Invalid choice. Please enter a number between 1 and 4.");
                break;
        }
    }
</script>


</body>
</html>
