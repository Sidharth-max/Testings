<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h3>user info</h3>
<table border="1">
  <thead>
  <tr>
    <th>id</th>
    <th>name</th>
    <th>username</th>
    <th>city</th>

  </tr>
  </thead>
  <tbody id="userInfo"> </tbody>
</table>
<script>
  const userInfo = document.getElementById('userInfo');

  fetch('https://jsonplaceholder.typicode.com/users')
    .then((response) => response.json())
    .then((data) => {
      let rows = '';

      data.forEach((user) => {
        rows += `<tr>
          <td>${user.id}</td>
          <td>${user.name}</td>
          <td>${user.username}</td>
          <td>${user.address.city}</td>
        </tr>`;
      });

      userInfo.innerHTML = rows;
    })
    .catch(() => {
      userInfo.innerHTML = '<tr><td colspan="4">Failed to load user data.</td></tr>';
    });
</script>
</body>
</html>
